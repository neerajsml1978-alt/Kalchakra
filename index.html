<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>आज का राशिफल</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div id="capture-area">
    <h1 style="text-align: center; color: #8b0000; margin: 20px 0;">आज का राशिफल - <span id="current-date"></span></h1>
    <div id="rashifal-container" class="grid-container"></div>
</div>

<!-- कैप्चर सेटिंग्स के लिए मॉडाल -->
<div id="capture-modal" style="display:none; position:fixed; top:20%; left:30%; background:white; padding:20px; border:2px solid #8b0000; z-index:1000; border-radius:10px; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">
    <h3>कैप्चर सेटिंग्स</h3>
    <label>शुरुआती कार्ड (1 से 12): <input type="number" id="start-idx" value="1"></label><br><br>
    <label>कितने कार्ड्स चाहिए: <input type="number" id="card-count" value="6"></label><br><br>
    <button onclick="executeCustomCapture()">कैप्चर करें</button>
    <button onclick="document.getElementById('capture-modal').style.display='none'">बंद करें</button>
</div>

<script src="script.js"></script>
<script src="download-button.js"></script>
<script>
    window.addEventListener('load', function() {
        createCustomCaptureButton();
    });
</script>
</body>
</html>
